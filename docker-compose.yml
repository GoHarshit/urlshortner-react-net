version: '3.9'

services:

  backend:
    build:
      context: ./UrlShortner

    container_name: urlshortner-api

    ports:
      - "5000:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection:
        Host=postgres;
        Port=5432;
        Database=urlshortnerdb;
        Username=postgres;
        Password=postgres

      Redis__ConnectionString:
        redis:6379

      Jwt__Key:
        THIS_IS_SUPER_SECRET_KEY_123456

      Jwt__Issuer:
        UrlShortnerApi

      Jwt__Audience:
        UrlShortnerUsers

    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./url-shortner-client

    container_name: urlshortner-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

  postgres:
    image: postgres:16

    container_name: urlshortner-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortnerdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: urlshortner-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: